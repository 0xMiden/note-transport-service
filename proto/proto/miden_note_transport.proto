syntax = "proto3";

package miden_note_transport;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// A Note exchanged over the Transport Layer.
// Includes the full header for NoteId, NoteTag access.
message TransportNote {
    // NoteHeader
    bytes header = 1;
    // NoteDetails, can be encrypted
    bytes details = 2;
    // Block number where the note's on-chain commitment was included.
    //
    // Sender-populated, optional. The NTL stores this verbatim and does not
    // validate, fetch, or backfill it. Population strategies:
    //
    //   - Exact: set after the sender's transaction confirms (typically
    //     5-15 seconds after submit on Miden). Gives the recipient the
    //     precise block to scan.
    //   - Lower bound: set to the chain tip at send time, optionally minus
    //     a small safety margin. Any value <= the actual commitment block
    //     works correctly - the recipient uses it as the floor for its
    //     commitment scan.
    //   - Unset: the recipient falls back to its own lookback heuristic
    //     (currently a 20-block scan window in miden-client).
    //
    // Wallets that need deterministic note delivery should always populate
    // this field.
    optional uint32 commitment_block_num = 3;

    // Serialized NoteMetadata from the commitment block.
    //
    // Sender-populated, optional. When present, the recipient can skip
    // sync_notes entirely and transition the note to Committed immediately
    // during import. The NTL stores this verbatim without validation.
    optional bytes note_metadata = 4;
}

// API request for sending a note
message SendNoteRequest {
    TransportNote note = 1;
}

// API response for sending a note
message SendNoteResponse { }

// API request for fetching notes
message FetchNotesRequest {
    repeated fixed32 tags = 1;
    fixed64 cursor = 2;
}

// API response for fetching notes
message FetchNotesResponse {
    repeated TransportNote notes = 1;
    // Transport Layer pagination
    fixed64 cursor = 2;
}

// API request for streaming notes
message StreamNotesRequest {
    fixed32 tag = 1;
    fixed64 cursor = 2;
}

// API response for streaming notes updates
message StreamNotesUpdate {
    repeated TransportNote notes = 1;
    // Transport Layer pagination
    fixed64 cursor = 2;
}

// Server statistics
message StatsResponse {
    uint64 total_notes = 1;
    uint64 total_tags = 2;
    repeated TagStats notes_per_tag = 3;
}

// Statistics for a specific tag
message TagStats {
    fixed32 tag = 1;
    uint64 note_count = 2;
    google.protobuf.Timestamp last_activity = 3;
}

// gRPC service definition
service MidenNoteTransport {
    // Send a note to the server
    rpc SendNote(SendNoteRequest) returns (SendNoteResponse);
    
    // Fetch notes for a specific tag
    rpc FetchNotes(FetchNotesRequest) returns (FetchNotesResponse);

    // Stream notes for a specific tag
    rpc StreamNotes(StreamNotesRequest) returns (stream StreamNotesUpdate);
    
    // Get server statistics
    rpc Stats(google.protobuf.Empty) returns (StatsResponse);
} 
