name: Publish Rust Crates on Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      # Important: use an absolute path so `cargo publish` verification builds
      # (which happen from `target/package/...`) don't create nested `target/` dirs.
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Ensure the release tag refers to the latest commit on main.
          # Compare the commit SHA that triggered the workflow with the HEAD of the branch we just
          # checked out (main).
          ref: main

      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner

      - name: Verify release was triggered from main HEAD
        run: |
          tag_sha="${{ github.sha }}"
          main_sha="$(git rev-parse HEAD)"

          echo "Tag points to:        $tag_sha"
          echo "Current main HEAD is: $main_sha"

          if [ "$tag_sha" != "$main_sha" ]; then
            echo "::error::The release tag was not created from the latest commit on main. Aborting."
            exit 1
          fi
          echo "Release tag matches main HEAD — continuing."

      - name: Update Rust toolchain
        run: |
          rustup update --no-self-update

      - name: Preflight - publish dry run
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          cargo publish --workspace

      - name: Cleanup cargo package artifacts (after dry-run)
        if: always()
        run: |
          rm -rf "$CARGO_TARGET_DIR/package" || true

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          cargo publish --workspace
