name: Publish Rust Crates on Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      # Important: use an absolute path so `cargo publish` verification builds
      # (which happen from `target/package/...`) don't create nested `target/` dirs.
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Check out the branch or commit the release was created from.
          ref: ${{ github.event.release.target_commitish }}

      - name: Cleanup large tools for build space
        uses: ./.github/actions/cleanup-runner

      - name: Verify release was triggered from branch HEAD
        run: |
          tag_sha="${{ github.sha }}"
          branch_sha="$(git rev-parse HEAD)"
          release_branch="${{ github.event.release.target_commitish }}"

          echo "Tag points to:           $tag_sha"
          echo "Branch '$release_branch' HEAD is: $branch_sha"

          if [ "$tag_sha" != "$branch_sha" ]; then
            echo "::error::The release tag was not created from the latest commit on '$release_branch'. Aborting."
            exit 1
          fi
          echo "Release tag matches '$release_branch' HEAD - continuing."

      - name: Update Rust toolchain
        run: |
          rustup update --no-self-update

      - name: Preflight - publish dry run
        continue-on-error: true
        run: |
          cargo publish --workspace --dry-run

      - name: Cleanup cargo package artifacts (after dry-run)
        if: always()
        run: |
          rm -rf "$CARGO_TARGET_DIR/package" || true

      - name: Publish crates
        run: |
          cargo publish --workspace
